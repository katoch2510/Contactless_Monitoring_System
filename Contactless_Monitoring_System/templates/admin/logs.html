<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entry Logs — SmartCampus Admin</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <span>SmartCampus.</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>

      <a href="/admin/logs" class="active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Entry Logs</a>
      <a href="/admin/register-student"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Register Student</a>
      <a href="/admin/register-faculty"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Register Faculty</a>
      <a href="/admin/profiles">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Registered Profiles
      </a>

    </nav>
    <div class="sidebar-footer"><button onclick="clearUser();window.location='/login'"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</button></div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Campus Entry Logs</span>
      <div class="search-box" style="width:220px;">
        <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" class="form-input" id="searchInput" placeholder="Search logs..." oninput="render()" />
      </div>
    </header>
    <main class="page-content">
      <div class="table-wrap">
        <div class="overflow-x">
          <table>
            <thead><tr><th>Person Details</th><th>Type</th><th>Entry Time</th><th>Exit Time</th><th>Gate</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
          <p id="noLogs" style="display:none;text-align:center;padding:2rem;color:var(--text-muted);font-size:.875rem;">No logs found matching your search.</p>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/toast.js"></script>
<script>
requireAuth();
let logs = [];

async function load() {
  try {
    logs = await api.get('/api/qr/logs');
    render();
  } catch(e) { showToast('Failed to load entry logs','error'); }
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = logs.filter(l =>
    (l.person_id?.name||'').toLowerCase().includes(q) ||
    l.person_type.toLowerCase().includes(q)
  );
  const badge = type => type === 'Student' ? 'badge-purple' : type === 'Faculty' ? 'badge-blue' : 'badge-green';
  document.getElementById('tableBody').innerHTML = filtered.map(l => {
    const entry = l.entry_time ? new Date(l.entry_time).toLocaleString() : '—';
    const exit = l.exit_time
      ? `<div style="display:flex;align-items:center;gap:.375rem;font-size:.875rem;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>${new Date(l.exit_time).toLocaleString()}</div>`
      : `<span class="badge badge-green">Inside Campus</span>`;
    return `<tr>
      <td><div style="font-weight:600;font-size:.875rem;">${l.person_id?.name||'Unknown'}</div><div style="font-size:.75rem;color:var(--text-muted);">${l.person_id?.email||'N/A'}</div></td>
      <td><span class="badge ${badge(l.person_type)}">${l.person_type}</span></td>
      <td><div style="display:flex;align-items:center;gap:.375rem;font-size:.875rem;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>${entry}</div></td>
      <td>${exit}</td>
      <td style="font-size:.875rem;color:var(--text-muted);">${l.gate_location||'—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('noLogs').style.display = filtered.length === 0 ? '' : 'none';
}
load();
</script>
</body>
</html>
