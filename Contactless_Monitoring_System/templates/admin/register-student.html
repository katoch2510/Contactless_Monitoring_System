<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Student — SmartCampus Admin</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><span>SmartCampus.</span></div>
    <nav class="sidebar-nav">
      <a href="/admin/"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>

      <a href="/admin/logs"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Entry Logs</a>
      <a href="/admin/register-student" class="active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Register Student</a>
      <a href="/admin/register-faculty"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Register Faculty</a>
      <a href="/admin/profiles">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Registered Profiles
      </a>

    </nav>
    <div class="sidebar-footer"><button onclick="clearUser();window.location='/login'"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</button></div>
  </aside>
  <div class="main-content">
    <header class="topbar"><span class="topbar-title">Register Student Face Profile</span></header>
    <main class="page-content">
      <div style="display:none;" id="loadingModels" style="text-align:center;padding:4rem;"><div class="spinner" style="margin:0 auto;"></div><p style="color:var(--text-muted);margin-top:1rem;">Loading Face Recognition Models...</p></div>

      <div id="regContent" style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:900px;margin:0 auto;">
        <!-- Webcam -->
        <div class="card" style="display:flex;flex-direction:column;align-items:center;">
          <h3 style="margin-bottom:1rem;align-self:flex-start;">📷 Live Camera Feed</h3>
          <div class="webcam-box" style="width:100%;min-height:280px;border-color:var(--border);">
            <div id="camLoader" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface2);color:var(--text-muted);font-size:.85rem;gap:.75rem;"><div class="spinner"></div>Initializing...</div>
            <video id="webcam" autoplay playsinline style="width:100%;display:block;"></video>
          </div>
          <button id="captureBtn" class="btn btn-primary w-full" style="margin-top:1rem;" onclick="captureFace()" disabled>
            🔬 Capture Biometric Descriptor
          </button>
          <p id="capturedOk" style="display:none;color:var(--green);font-size:.875rem;font-weight:600;margin-top:.75rem;">✓ Biometric Descriptor Captured</p>
        </div>

        <!-- Form -->
        <div class="card">
          <h3 style="margin-bottom:1.25rem;">👤 Student Details</h3>
          <div class="space-y-4">
            <div class="form-group"><label class="form-label">Student ID</label><input id="student_id" type="text" class="form-input" placeholder="e.g. S-1001" required /></div>
            <div class="form-group"><label class="form-label">Full Name</label><input id="name" type="text" class="form-input" placeholder="John Doe" required /></div>
            <div class="form-group"><label class="form-label">Email Address</label><input id="email" type="email" class="form-input" placeholder="john@student.edu" required /></div>

            <button id="submitBtn" class="btn btn-success w-full" style="padding:.75rem;" onclick="submitForm()" disabled>Complete Registration</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/toast.js"></script>
<script>
requireAuth();
let faceDescriptor = null;
let photoBase64 = null;
let webcamStream = null;



async function init() {
  document.getElementById('loadingModels').style.display = '';
  document.getElementById('regContent').style.display = 'none';
  try {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri('/static/models'),
      faceapi.nets.faceLandmark68Net.loadFromUri('/static/models'),
      faceapi.nets.faceRecognitionNet.loadFromUri('/static/models'),
    ]);
    webcamStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    document.getElementById('webcam').srcObject = webcamStream;
    document.getElementById('camLoader').style.display = 'none';
    document.getElementById('captureBtn').disabled = false;

    document.getElementById('loadingModels').style.display = 'none';
    document.getElementById('regContent').style.display = 'grid';
  } catch(e) {
    document.getElementById('camLoader').innerHTML = '<span style="color:var(--red);">⚠ Failed to load camera/models</span>';
    showToast('Failed to load dependencies', 'error');
  }
}

async function captureFace() {
  const video = document.getElementById('webcam');
  const btn = document.getElementById('captureBtn');
  btn.disabled = true; btn.textContent = 'Scanning...';
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const img = new Image(); img.src = canvas.toDataURL();
  img.onload = async () => {
    const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
    if (det) {
      faceDescriptor = Array.from(det.descriptor);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('capturedOk').style.display = '';
      document.getElementById('submitBtn').disabled = false;
      showToast('Face captured!', 'success');
    } else {
      showToast('No face detected. Try again.', 'error');
    }
    btn.disabled = false; btn.innerHTML = '🔬 Capture Biometric Descriptor';
  };
}

async function submitForm() {
  if (!faceDescriptor) return showToast('Please capture face first.', 'warning');
  const payload = {
    student_id: document.getElementById('student_id').value.trim(),
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    face_encoding: faceDescriptor,
    photo_base64: photoBase64
  };
  if (!payload.student_id || !payload.name || !payload.email) {
    return showToast('Please fill all fields.', 'warning');
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Saving Profile...';
  try {
    await api.post('/api/students/register', payload);
    showToast('Student Registered Successfully!', 'success');
    // Reset form
    ['student_id','name','email'].forEach(id => document.getElementById(id).value = '');
    faceDescriptor = null;
    photoBase64 = null;
    document.getElementById('capturedOk').style.display = 'none';
  } catch(e) {
    showToast(e.message || 'Failed to register student', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Complete Registration';
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
