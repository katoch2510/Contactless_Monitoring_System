<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Approvals — SmartCampus Admin</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <span>SmartCampus.</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="/admin/approvals" class="active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Pending Approvals</a>
      <a href="/admin/logs"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Entry Logs</a>
      <a href="/admin/register-student"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Register Student</a>
      <a href="/admin/register-faculty"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Register Faculty</a>
      <a href="/admin/institutions"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Institution Manager</a>
    </nav>
    <div class="sidebar-footer"><button onclick="clearUser();window.location='/login'"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</button></div>
  </aside>
  <div class="main-content">
    <header class="topbar"><span class="topbar-title">Pending Approvals</span></header>
    <main class="page-content">
      <div id="emptyState" class="hidden" style="display:none;">
        <div class="card text-center" style="padding:4rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" stroke="var(--text-muted)" stroke-width="1.5" viewBox="0 0 24 24" style="display:block;margin:0 auto 1rem;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <h3>No Pending Approvals</h3>
          <p style="color:var(--text-muted);margin-top:.5rem;">All caught up! No visitors waiting for approval.</p>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap" style="display:none;">
        <div class="overflow-x">
          <table>
            <thead><tr>
              <th>Visitor Details</th><th>Purpose</th><th>Scheduled Date</th><th style="text-align:right;">Actions</th>
            </tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/toast.js"></script>
<script>
requireAuth();
let visitors = [];

async function load() {
  try {
    visitors = await api.get('/api/visitors/pending');
    render();
  } catch(e) { showToast('Failed to load pending visitors','error'); }
}

function render() {
  if (visitors.length === 0) {
    document.getElementById('emptyState').style.display = '';
    document.getElementById('tableWrap').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('tableWrap').style.display = '';
  document.getElementById('tableBody').innerHTML = visitors.map(v => {
    const avatar = v.photo_base64
      ? `<img src="${v.photo_base64}" style="width:2.5rem;height:2.5rem;border-radius:9999px;object-fit:cover;border:1px solid var(--border);" />`
      : `<div style="width:2.5rem;height:2.5rem;border-radius:9999px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);">${(v.name||'?')[0].toUpperCase()}</div>`;
    const date = v.visit_date ? new Date(v.visit_date).toLocaleString() : 'N/A';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:.875rem;">
        ${avatar}
        <div><div style="font-weight:600;">${v.name}</div><div style="font-size:.8rem;color:var(--text-muted);">${v.phone||''}</div><div style="font-size:.75rem;color:var(--primary);">${v.email||''}</div></div>
      </div></td>
      <td style="max-width:200px;"><span style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.875rem;">${v.purpose||''}</span></td>
      <td style="font-size:.875rem;color:var(--text-muted);">${date}</td>
      <td style="text-align:right;"><div style="display:flex;gap:.5rem;justify-content:flex-end;">
        <button class="btn btn-success btn-sm" onclick="updateStatus(${v.id},'Approved')">✓ Approve</button>
        <button class="btn btn-danger btn-sm" onclick="updateStatus(${v.id},'Rejected')">✗ Reject</button>
      </div></td>
    </tr>`;
  }).join('');
}

async function updateStatus(id, status) {
  try {
    await api.put(`/api/visitors/${id}/status`, { status });
    showToast(`Visitor ${status}!`, 'success');
    visitors = visitors.filter(v => v.id !== id);
    render();
  } catch(e) { showToast(e.message||'Failed to update status','error'); }
}
load();
</script>
</body>
</html>
